apiVersion: v1
kind: Service
metadata:
  name: {{ include "product-discovery.fullname" . }}
  labels:
    {{- include "product-discovery.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "product-discovery.appSelector" . | nindent 4 }}
{{- if .Values.mcpGateway.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "product-discovery.fullname" . }}-mcp-gateway
  labels:
    {{- include "product-discovery.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.mcpGateway.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "product-discovery.mcpSelector" . | nindent 4 }}
{{- end }}
