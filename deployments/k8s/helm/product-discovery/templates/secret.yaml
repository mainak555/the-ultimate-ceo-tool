{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "product-discovery.secretName" . }}
  labels:
    {{- include "product-discovery.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.secretEnv }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
