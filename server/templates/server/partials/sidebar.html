<!-- Sidebar project list (HTMX partial) -->
{% if projects %}
  <ul class="sidebar__list">
    {% for project in projects %}
      <li class="sidebar__item">
        <span class="sidebar__name"
              hx-get="{% url 'server:project_detail' project.project_id %}"
              hx-target="#main-content"
              hx-push-url="false">
          {{ project.project_name }}
          <small class="sidebar__version">v{{ project.version|floatformat:1 }}</small>
        </span>
        <button class="sidebar__delete"
                hidden
                type="button"
                data-delete-blocked="{% if project.has_chat_sessions %}true{% else %}false{% endif %}"
                data-default-title="Delete {{ project.project_name }}"
                data-blocked-title="Cannot delete {{ project.project_name }} while chat sessions exist. Delete chat sessions first."
                {% if project.has_chat_sessions %}
                title="Cannot delete {{ project.project_name }} while chat sessions exist."
                {% else %}
                title="Delete {{ project.project_name }}"
                {% endif %}
                {% if not project.has_chat_sessions %}
                hx-post="{% url 'server:project_delete' project.project_id %}"
                hx-confirm="Delete '{{ project.project_name }}'? This cannot be undone."
                hx-target="closest li"
                hx-swap="outerHTML"
                {% endif %}>
          &times;
        </button>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p class="sidebar__empty">No projects yet.</p>
{% endif %}
