<!-- ====== HEADER BAR ====== -->
<header class="header">
  <div class="header__brand">
    <h1 class="header__title">The Ultimate CEO Tool</h1>
    <!--span class="header__hint"></span-->
  </div>

  <div class="header__actions">

    <!-- Home -->
    <a class="btn btn--secondary" href="{% url 'server:index' %}">
      Home
    </a>

    <!-- Configurations -->
    <a class="btn btn--primary" href="{% url 'server:configurations_page' %}">
      Configurations
    </a>

    <!-- Secret Key is attached to HTMX requests by app.js -->
    <div class="header__auth">
      <input type="password"
             id="global-secret-key"
             class="input input--sm"
             placeholder="Secret Key"
             autocomplete="off">
    </div>
  </div>
</header>
